apiVersion: v1
kind: Secret
metadata:
  name: laravel-auth-secrets
  namespace: laravel-auth
type: Opaque
stringData:
  # IMPORTANT: Replace these values with your actual secrets!
  # For production, use kubectl create secret or external secret management
  APP_KEY: "base64:your-32-character-app-key-here="
  DB_USERNAME: "laravel"
  DB_PASSWORD: "your-secure-database-password"
  REDIS_PASSWORD: ""
  
  # For SMS providers (OTP Auth Kit)
  VONAGE_KEY: ""
  VONAGE_SECRET: ""
  TWILIO_SID: ""
  TWILIO_TOKEN: ""
  
  # For Social Auth Kit
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""
